<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>市场监测规范速查手册</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { 
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', sans-serif;
    background: #f0f4ff;
    color: #333;
    min-height: 100vh;
  }

  /* ===== 顶部 Hero ===== */
  .hero {
    background: linear-gradient(135deg, #1a6fc4 0%, #0fa3b1 100%);
    padding: 28px 20px 60px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 180px; height: 180px;
    background: rgba(255,255,255,0.08);
    border-radius: 50%;
  }
  .hero::after {
    content: '';
    position: absolute;
    bottom: -60px; left: -30px;
    width: 200px; height: 200px;
    background: rgba(255,255,255,0.05);
    border-radius: 50%;
  }
  .hero-badge {
    display: inline-block;
    background: rgba(255,255,255,0.2);
    color: #fff;
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 10px;
  }
  .hero h1 {
    color: #fff;
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 6px;
    position: relative;
  }
  .hero p {
    color: rgba(255,255,255,0.85);
    font-size: 13px;
    position: relative;
  }

  /* ===== 搜索框 ===== */
  .search-wrap {
    margin: -28px 16px 0;
    position: relative;
    z-index: 10;
  }
  .search-box {
    display: flex;
    align-items: center;
    background: #fff;
    border-radius: 16px;
    padding: 12px 16px;
    box-shadow: 0 4px 20px rgba(26,111,196,0.15);
    gap: 10px;
  }
  .search-icon { font-size: 18px; color: #1a6fc4; flex-shrink: 0; }
  .search-box input {
    flex: 1;
    border: none;
    outline: none;
    font-size: 15px;
    color: #333;
    background: transparent;
  }
  .search-box input::placeholder { color: #aaa; }
  .search-clear {
    font-size: 18px;
    color: #ccc;
    cursor: pointer;
    display: none;
  }

  /* ===== 搜索结果 ===== */
  .search-results {
    display: none;
    margin: 12px 16px 0;
  }
  .search-results.show { display: block; }
  .search-result-title {
    font-size: 13px;
    color: #888;
    margin-bottom: 8px;
    padding-left: 4px;
  }
  .search-hit {
    background: #fff;
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 10px;
    border-left: 4px solid #1a6fc4;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .search-hit .hit-tag {
    font-size: 11px;
    background: #e8f1ff;
    color: #1a6fc4;
    padding: 2px 8px;
    border-radius: 10px;
    display: inline-block;
    margin-bottom: 6px;
  }
  .search-hit .hit-q { font-size: 14px; font-weight: 600; color: #222; margin-bottom: 6px; }
  .search-hit .hit-a { font-size: 13px; color: #555; line-height: 1.6; }
  .search-hit .hit-a mark { background: #fff3cd; color: #b8860b; padding: 0 2px; border-radius: 3px; }
  .no-result {
    text-align: center;
    padding: 30px;
    color: #aaa;
    font-size: 14px;
  }
  .no-result .emoji { font-size: 36px; display: block; margin-bottom: 8px; }

  /* ===== Tab 导航 ===== */
  .tabs-wrap {
    margin: 20px 16px 0;
  }
  .tabs {
    display: flex;
    background: #fff;
    border-radius: 12px;
    padding: 4px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    gap: 4px;
  }
  .tab {
    flex: 1;
    text-align: center;
    padding: 8px 4px;
    border-radius: 9px;
    font-size: 13px;
    color: #888;
    cursor: pointer;
    transition: all 0.25s;
    user-select: none;
  }
  .tab.active {
    background: linear-gradient(135deg, #1a6fc4, #0fa3b1);
    color: #fff;
    font-weight: 600;
    box-shadow: 0 2px 8px rgba(26,111,196,0.3);
  }
  .tab .tab-icon { display: block; font-size: 16px; margin-bottom: 2px; }

  /* ===== 内容区 ===== */
  .content { padding: 16px 16px 80px; }
  .section { display: none; }
  .section.active { display: block; }

  /* ===== 分类速查卡片 ===== */
  .category-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
  }
  .cat-card {
    background: #fff;
    border-radius: 14px;
    padding: 16px 12px;
    text-align: center;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    transition: transform 0.2s, box-shadow 0.2s;
    border: 2px solid transparent;
  }
  .cat-card:active { transform: scale(0.97); }
  .cat-card.selected { border-color: #1a6fc4; background: #f0f6ff; }
  .cat-card .cat-icon { font-size: 28px; margin-bottom: 6px; display: block; }
  .cat-card .cat-name { font-size: 13px; font-weight: 600; color: #333; }
  .cat-card .cat-count { font-size: 11px; color: #aaa; margin-top: 2px; }

  .compare-list { display: none; }
  .compare-list.show { display: block; }
  .compare-section-title {
    font-size: 14px;
    font-weight: 700;
    color: #1a6fc4;
    padding: 12px 0 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .compare-card {
    background: #fff;
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    overflow: hidden;
  }
  .compare-card .aspect {
    font-size: 14px;
    font-weight: 700;
    color: #222;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .change-badge {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 10px;
    font-weight: 600;
  }
  .change-badge.major { background: #fee2e2; color: #dc2626; }
  .change-badge.new { background: #dcfce7; color: #16a34a; }
  .change-badge.adjust { background: #fef9c3; color: #ca8a04; }

  .compare-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 8px;
  }
  .compare-old, .compare-new {
    border-radius: 10px;
    padding: 10px;
    font-size: 12px;
    line-height: 1.6;
  }
  .compare-old {
    background: #fff5f5;
    border: 1px solid #fecaca;
  }
  .compare-new {
    background: #f0fdf4;
    border: 1px solid #bbf7d0;
  }
  .label-old, .label-new {
    font-size: 10px;
    font-weight: 700;
    margin-bottom: 4px;
    display: block;
  }
  .label-old { color: #ef4444; }
  .label-new { color: #16a34a; }
  .compare-note {
    font-size: 12px;
    color: #6b7280;
    background: #f9fafb;
    border-radius: 8px;
    padding: 8px 10px;
    border-left: 3px solid #e5e7eb;
    display: flex;
    align-items: flex-start;
    gap: 5px;
  }
  .compare-note-new {
    font-size: 12px;
    color: #374151;
    background: #f0fdf4;
    border-radius: 8px;
    padding: 10px;
    border-left: 3px solid #16a34a;
  }

  /* ===== FAQ ===== */
  .faq-item {
    background: #fff;
    border-radius: 14px;
    margin-bottom: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    overflow: hidden;
  }
  .faq-q {
    padding: 16px;
    font-size: 14px;
    font-weight: 600;
    color: #222;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    user-select: none;
    gap: 10px;
  }
  .faq-q .q-text { flex: 1; display: flex; align-items: flex-start; gap: 8px; }
  .faq-q .q-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
  .faq-q .arrow {
    font-size: 12px;
    color: #aaa;
    transition: transform 0.25s;
    flex-shrink: 0;
  }
  .faq-item.open .faq-q .arrow { transform: rotate(180deg); }
  .faq-a {
    display: none;
    padding: 0 16px 16px;
    font-size: 13px;
    color: #555;
    line-height: 1.7;
    border-top: 1px solid #f3f4f6;
    padding-top: 12px;
  }
  .faq-item.open .faq-a { display: block; }
  .faq-a .highlight {
    display: inline-block;
    background: #fef9c3;
    color: #92400e;
    border-radius: 5px;
    padding: 0 4px;
    font-weight: 600;
  }
  .faq-a .tip {
    margin-top: 8px;
    background: #eff6ff;
    border-radius: 8px;
    padding: 8px 10px;
    font-size: 12px;
    color: #1e40af;
    display: flex;
    gap: 5px;
  }
  .faq-cat-title {
    font-size: 13px;
    font-weight: 700;
    color: #6b7280;
    margin: 16px 0 8px;
    padding-left: 4px;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  /* ===== 浮动返回顶部 ===== */
  .back-top {
    position: fixed;
    right: 20px;
    bottom: 30px;
    width: 44px;
    height: 44px;
    background: linear-gradient(135deg, #1a6fc4, #0fa3b1);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 18px;
    box-shadow: 0 4px 14px rgba(26,111,196,0.4);
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 100;
  }
  .back-top.show { opacity: 1; }

  /* ===== 底部说明 ===== */
  .footer {
    text-align: center;
    font-size: 11px;
    color: #bbb;
    padding: 10px 0 4px;
  }

  /* ===== 动效 ===== */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .compare-card, .faq-item, .search-hit {
    animation: fadeIn 0.25s ease-out;
  }
</style>
</head>
<body>

<!-- Hero -->
<div class="hero">
  <div class="hero-badge">📋 2026年新版规范</div>
  <h1>市场监测规范速查手册</h1>

<!-- 搜索 -->

  </div>
</div>

<!-- 搜索结果 -->
<div class="search-results" id="searchResults">
  <div class="search-result-title" id="searchResultTitle"></div>
  <div id="searchResultList"></div>
</div>

<!-- Tab -->
<div class="tabs-wrap" id="mainContent">
  <div class="tabs">
    <div class="tab active" onclick="switchTab('compare')">
      <span class="tab-icon">📊</span>变化速查
    </div>
    <div class="tab" onclick="switchTab('faq')">
      <span class="tab-icon">❓</span>常见问题
    </div>
  </div>
</div>

<!-- 分类速查 -->
<div class="content">
  <div class="section active" id="sec-compare">
    <div class="category-grid" id="catGrid"></div>
    <div id="compareDetail"></div>
  </div>

  <div class="section" id="sec-faq">

</div>

<div class="back-top" id="backTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</div>

// ==================== 渲染 ====================
function renderCatGrid() {
  const grid = document.getElementById('catGrid');
  grid.innerHTML = CATEGORIES.map(c => `
    <div class="cat-card" id="cat-${c.id}" onclick="showCompare('${c.id}')">
      <span class="cat-icon">${c.icon}</span>
      <div class="cat-name">${c.name}</div>
      <div class="cat-count">${c.count}项变化</div>
    </div>
  `).join('');
}

let currentCat = null;
function showCompare(catId) {
  document.querySelectorAll('.cat-card').forEach(el => el.classList.remove('selected'));
  document.getElementById('cat-' + catId).classList.add('selected');

  const data = COMPARE_DATA[catId];
  currentCat = catId;
  const detail = document.getElementById('compareDetail');

  if (!data) { detail.innerHTML = ''; return; }

  const badgeColor = { major: 'major', new: 'new', adjust: 'adjust' };
  const badgeLabel = { major: '重大变化', new: '新增', adjust: '调整' };

  detail.innerHTML = `<div class="compare-section-title">${data.title}</div>` +
    data.items.map(item => {
      const hasOld = item.old && item.old !== '无此要求' && item.old !== '无';
      return `
      <div class="compare-card">
        <div class="aspect">
          ${item.aspect}
          <span class="change-badge ${item.badge}">${item.badgeText || badgeLabel[item.badge] || ''}</span>
        </div>
        ${hasOld ? `
        <div class="compare-row">
          <div class="compare-old">
            <span class="label-old">▼ 旧规范</span>
            ${item.old}
          </div>
          <div class="compare-new">
            <span class="label-new">▲ 新规范</span>
            ${item.newText}
          </div>
        </div>` : `
        <div class="compare-note-new">✅ ${item.newText}</div>
        `}
        <div class="compare-note">💡 ${item.note.replace('💡 ','')}</div>
      </div>`;
    }).join('');

  detail.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function renderFAQ() {
  const list = document.getElementById('faqList');
  list.innerHTML = FAQ_DATA.map(cat => `
    <div class="faq-cat-title">${cat.cat}</div>
    ${cat.items.map((item, idx) => `
      <div class="faq-item" onclick="toggleFAQ(this)">
        <div class="faq-q">
          <div class="q-text"><span class="q-icon">${item.icon}</span>${item.q}</div>
          <span class="arrow">▼</span>
        </div>
        <div class="faq-a">${item.a}</div>
      </div>
    `).join('')}
  `).join('');
}

function toggleFAQ(el) {
  el.classList.toggle('open');
}

// ==================== Tab 切换 ====================
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', ['compare','faq'][i] === name);
  });
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('sec-' + name).classList.add('active');
}

// ==================== 搜索 ====================
function doSearch(val) {
  const trimmed = val.trim();
  const clear = document.getElementById('searchClear');
  const results = document.getElementById('searchResults');
  const mainContent = document.getElementById('mainContent');
  const content = document.querySelector('.content');

  if (!trimmed) {
    clear.style.display = 'none';
    results.classList.remove('show');
    mainContent.style.display = '';
    content.style.display = '';
    return;
  }
  clear.style.display = 'block';
  mainContent.style.display = 'none';
  content.style.display = 'none';
  results.classList.add('show');

  const kw = trimmed.toLowerCase();
  const hits = [];

  // 搜FAQ
  ALL_FAQ_FLAT.forEach(item => {
    if (item.q.toLowerCase().includes(kw) || item.a.replace(/<[^>]+>/g,'').toLowerCase().includes(kw)) {
      hits.push({
        type: 'faq', tag: item.cat, q: item.q,
        a: item.a.replace(/<[^>]+>/g,'').replace(/\n/g,' ').substring(0, 80) + '…'
      });
    }
  });

  // 搜对比数据
  ALL_COMPARE_FLAT.forEach(item => {
    const searchStr = (item.aspect + item.old + item.newText + item.note).toLowerCase();
    if (searchStr.includes(kw)) {
      hits.push({
        type: 'compare', tag: item.section, q: item.aspect,
        a: `旧：${item.old || '无'} → 新：${item.newText}`
      });
    }
  });

  const titleEl = document.getElementById('searchResultTitle');
  const listEl = document.getElementById('searchResultList');
  titleEl.textContent = hits.length > 0 ? `找到 ${hits.length} 条相关内容` : '';

  if (hits.length === 0) {
    listEl.innerHTML = `<div class="no-result"><span class="emoji">🔍</span>没找到"${trimmed}"相关内容<br>换个关键词试试？</div>`;
    return;
  }

  listEl.innerHTML = hits.map(h => {
    const hl = (str) => str.replace(new RegExp(trimmed.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'), m => `<mark>${m}</mark>`);
    return `
      <div class="search-hit">
        <span class="hit-tag">${h.tag}</span>
        <div class="hit-q">${hl(h.q)}</div>
        <div class="hit-a">${hl(h.a)}</div>
      </div>`;
  }).join('');
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  doSearch('');
}

  const btn = document.getElementById('backTop');

});
